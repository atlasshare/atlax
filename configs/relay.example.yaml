# atlax relay server configuration
#
# Copy this file to relay.yaml and adjust for your environment.
# All values shown are defaults unless noted otherwise.

server:
  # Address for agent TLS connections (mTLS)
  listen_addr: ":8443"

  # Address for the admin/metrics API
  admin_addr: ":9090"

  # Unix socket for admin API (optional, empty = TCP only).
  # Requires RuntimeDirectory=atlax in the systemd unit.
  # admin_socket: /run/atlax/atlax.sock

  # Maximum number of concurrent agent connections
  max_agents: 1000

  # Maximum multiplexed streams per agent connection.
  # Community edition: hardcoded to 50. Enterprise edition: configurable.
  # max_streams_per_agent: 50

  # Idle timeout for agent connections with no active streams
  idle_timeout: 300s

  # Grace period for draining streams during shutdown (GOAWAY)
  shutdown_grace_period: 30s

tls:
  # Relay server certificate (signed by Relay Intermediate CA)
  # Use chain cert (relay.crt + relay-ca.crt), not bare cert.
  cert_file: /etc/atlax/certs/relay-chain.crt
  key_file: /etc/atlax/certs/relay.key

  # Root CA certificate for verifying the certificate chain
  ca_file: /etc/atlax/certs/root-ca.crt

  # Customer Intermediate CA for verifying agent client certificates
  client_ca_file: /etc/atlax/certs/customer-ca.crt

  # Minimum TLS version (1.3 enforced, do not lower)
  min_version: "1.3"

# Customer port allocations
# Each customer gets dedicated TCP ports on the relay.
# Production uses CN=customer-{uuid}; dev uses customer-dev-001.
customers:
  - id: "customer-dev-001"

    # Maximum concurrent connections from this customer's agents.
    # Default 1: new agent connection replaces old one with GOAWAY.
    max_connections: 1

    # Maximum concurrent streams (active client connections forwarded
    # to this customer). 0 = unlimited.
    max_streams: 100

    ports:
      - port: 8080
        service: "http"
        description: "HTTP web service"

        # Bind address for this port. Default: 0.0.0.0 (all interfaces).
        # Set to 127.0.0.1 when using a reverse proxy (Caddy/nginx)
        # so only the proxy can reach the relay port.
        # listen_addr: "127.0.0.1"

      - port: 8081
        service: "smb"
        description: "SMB file sharing"

logging:
  # Log level: debug, info, warn, error
  level: info

  # Log format: json (recommended for production) or text
  format: json

  # Include source file and line number in log output
  add_source: false

metrics:
  # Enable Prometheus metrics endpoint
  enabled: true

  # Metrics endpoint path (served on admin_addr)
  path: /metrics

  # Metric name prefix
  prefix: atlax
