name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --config .golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  vet:
    name: Vet and Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build
          -ldflags="-s -w
          -X github.com/atlasshare/atlax/internal/config.Version=${{ github.sha }}
          -X github.com/atlasshare/atlax/internal/config.Commit=${{ github.sha }}
          -X github.com/atlasshare/atlax/internal/config.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          -o bin/atlax-relay-${{ matrix.goos }}-${{ matrix.goarch }}
          ./cmd/relay/

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build
          -ldflags="-s -w
          -X github.com/atlasshare/atlax/internal/config.Version=${{ github.sha }}
          -X github.com/atlasshare/atlax/internal/config.Commit=${{ github.sha }}
          -X github.com/atlasshare/atlax/internal/config.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          -o bin/atlax-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          ./cmd/agent/

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          retention-days: 7

  docker:
    name: Docker Build and Scan
    runs-on: ubuntu-latest
    needs: [lint, test, vet]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/docker/Dockerfile.relay
          push: false
          load: true
          tags: atlax-relay:ci
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/docker/Dockerfile.agent
          push: false
          load: true
          tags: atlax-agent:ci
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan relay image with Trivy
        run: trivy image --exit-code 1 --severity CRITICAL,HIGH --format table atlax-relay:ci

      - name: Scan agent image with Trivy
        run: trivy image --exit-code 1 --severity CRITICAL,HIGH --format table atlax-agent:ci
